version: "3.8"

services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/company-website:latest
    container_name: server
    restart: unless-stopped
    expose:
      - 3000
      - 8080
    command: server
    environment:
      SERVER_SECRET_KEY: ${SECRET_KEY}
      SERVER_LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      SERVER_REDIS__HOST: redis
      SERVER_POSTGRESQL__HOST: postgresql
      SERVER_POSTGRESQL__USER: ${PG_USER}
      SERVER_POSTGRESQL__NAME: ${PG_DB}
      SERVER_POSTGRESQL__PASSWORD: ${PG_PASS}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/entrypoint-cloud.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/company-website:latest
    container_name: worker
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    environment:
      WORKER_SECRET_KEY: ${SECRET_KEY}
      WORKER_LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      WORKER_REDIS__HOST: redis
      WORKER_POSTGRESQL__HOST: postgresql
      WORKER_POSTGRESQL__USER: ${PG_USER}
      WORKER_POSTGRESQL__NAME: ${PG_DB}
      WORKER_POSTGRESQL__PASSWORD: ${PG_PASS}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy  

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates: