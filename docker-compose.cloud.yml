services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/company-website:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - 3000
      - 8080
    command: server
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: 3000
      API_PORT: 8080
      REDIS__HOST: redis
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/company-website:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      HOST: ${DOMAIN_HOST:-localhost}
      REDIS__HOST: redis
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates:
