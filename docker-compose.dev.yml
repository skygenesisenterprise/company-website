services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/company-website:latest
    restart: unless-stopped
    ports:
      - 3000:3000
    expose:
      - 8080
    command: server
    environment:
      SECRET_KEY: ${SECRET_KEY}
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST}
      REDIS__HOST: redis
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__USER: ${PG_USER}
      POSTGRESQL__NAME: ${PG_DB}
      POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/entrypoint.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/company-website:latest
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    environment:
      SECRET_KEY: ${SECRET_KEY}
      HOST: ${DOMAIN_HOST}
      REDIS__HOST: redis
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__USER: ${PG_USER}
      POSTGRESQL__NAME: ${PG_DB}
      POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/entrypoint.sh"]

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates: